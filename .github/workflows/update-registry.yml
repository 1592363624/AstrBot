name: Update Plugin Registry

on:
  # 推送到 master 分支时触发（任何提交都会触发）
  push:
    branches:
      - master
  
  # 定时任务：每 3 小时检查一次插件仓库更新
  schedule:
    - cron: '0 */3 * * *'
  
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-registry:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pyyaml
      
      - name: Run registry generator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python generate_registry.py --config config.yaml --sources sources.yaml --generate-sources
      
      - name: Check for changes
        id: check_changes
        run: |
          git add plugins.json sources.yaml README.md
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins.json sources.yaml README.md
          git commit -m "chore: update plugin registry [automated]"
          git push
